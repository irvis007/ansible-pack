- name: "[applications] Download Obsidian AppImage"
  become: true
  ansible.builtin.get_url:
    url: "{{ obsidian_latest.json.assets | selectattr('name', 'match', '.*\\.AppImage$') | rejectattr('name', 'search', appimage_arch_reject) | map(attribute='browser_download_url') | first }}"
    dest: "{{ appimage_install_dir }}/Obsidian.AppImage"
    mode: '0755'
