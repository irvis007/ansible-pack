---
# Install productivity tools (no snap!)

# ============================================================================
# Flameshot 
# ============================================================================
- name: "[applications] Install Flameshot (screenshot/snipping tool)"
  become: true
  ansible.builtin.apt:
    name: flameshot
    state: present
    update_cache: yes
  when: flameshot_enabled | bool
  tags: ['flameshot']

# Per-user XFCE setting: run WITHOUT become so it targets the invoking user's
# session bus. Requires a running XFCE session (xfconfd on the session D-Bus).
- name: "[applications] Bind '{{ flameshot_keybinding_key }}' key to Flameshot (XFCE)"
  community.general.xfconf:
    channel: xfce4-keyboard-shortcuts
    property: "/commands/custom/{{ flameshot_keybinding_key }}"
    value_type: string
    value: "{{ flameshot_command }}"
  when: flameshot_enabled | bool and flameshot_set_keybinding | bool
  tags: ['flameshot']

# ============================================================================
# Setup: Create AppImage directories
# ============================================================================
- name: "[applications] Create AppImage directory"
  become: true
  ansible.builtin.file:
    path: "{{ appimage_install_dir }}"
    state: directory
    mode: '0755'
  when: obsidian_enabled | bool or pomotroid_enabled | bool

# ============================================================================
# Nextcloud Desktop Client (AppImage)
# ============================================================================
- name: "[applications] Check if Nextcloud is installed"
  ansible.builtin.stat:
    path: "{{ appimage_install_dir }}/Nextcloud.AppImage"
  register: nextcloud_check
  when: nextcloud_enabled | bool

- name: "[applications] Get latest Nextcloud version"
  ansible.builtin.uri:
    url: https://api.github.com/repos/nextcloud-releases/desktop/releases/latest
    return_content: true
  register: nextcloud_latest
  when: nextcloud_enabled | bool and not nextcloud_check.stat.exists

- name: "[applications] Download Nextcloud AppImage"
  ansible.builtin.get_url:
    url: "{{ nextcloud_latest.json.assets | selectattr('name', 'match', '.*\\.AppImage$') | rejectattr('name', 'search', appimage_arch_reject) | map(attribute='browser_download_url') | first }}"
    dest: "{{ appimage_install_dir }}/Nextcloud.AppImage"
    mode: '0755'
  become: true
  when: nextcloud_enabled | bool and not nextcloud_check.stat.exists

- name: "[applications] Create Nextcloud symlink"
  become: true
  ansible.builtin.file:
    src: "{{ appimage_install_dir }}/Nextcloud.AppImage"
    dest: "{{ appimage_bin_dir }}/nextcloud"
    state: link
    follow: false
    force: yes
  when: nextcloud_enabled | bool

- name: "[applications] Create Nextcloud desktop launcher + autostart"
  ansible.builtin.include_tasks: desktop-entry.yml
  vars:
    de_cmd: "nextcloud"
    de_appimage: "{{ appimage_install_dir }}/Nextcloud.AppImage"
    de_name: "Nextcloud"
    de_comment: "Nextcloud desktop synchronization client"
    de_categories: "Network;FileTransfer;"
    de_autostart: "{{ nextcloud_autostart }}"
  when: nextcloud_enabled | bool and appimage_create_desktop_entries | bool

# ============================================================================
# Obsidian - Note-taking app (AppImage)
