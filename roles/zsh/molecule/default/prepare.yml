---
# Prepare playbook - sets up test environment
- name: Prepare
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: Install required packages for testing
      ansible.builtin.package:
        name:
          - git
          - curl
          - sudo
        state: present

    - name: Ensure test user has home directory
      ansible.builtin.file:
        path: /home/test
        state: directory
        owner: test
        group: test
        mode: '0755'
      when: ansible_user_id is defined
