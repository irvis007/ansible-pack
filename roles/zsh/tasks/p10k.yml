# tasks file for p10k
- name: include vars
  include_vars: vars.yml

- name: Install Powerline10k theme # noqa: latest
  ansible.builtin.git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: ~/.oh-my-zsh/custom/themes/powerlevel10k
    depth: 1

- name: Configure zshrc for p10k
  ansible.builtin.copy:
    src: zshrc-p10k
    dest: "{{ ansible_env.HOME }}/.zshrc"
    mode: '0644'
    backup: yes
  when: copy_dot_files

- name: Copy p10k.zsh
  ansible.builtin.copy:
    src: p10k.zsh
    dest: ~/.p10k.zsh
    mode: 0644
  when: copy_dot_files
