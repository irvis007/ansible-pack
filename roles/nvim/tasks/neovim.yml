---
# Install Neovim (Official pre-built binary from GitHub - Latest Stable)

- name: "[nvim] Check currently installed Neovim version (if any)"
  ansible.builtin.command: nvim --version
  register: nvim_check
  failed_when: false
  changed_when: false

# Install/reinstall when Neovim is missing OR the installed version does not
# match the pinned nvim_version. This lets a re-run heal machines that already
# have an incompatible version (e.g. a previously installed "latest" 0.12.x).
- name: "[nvim] Determine whether the pinned Neovim version needs installing"
  ansible.builtin.set_fact:
    nvim_needs_install: "{{ nvim_check.rc != 0 or nvim_version not in (nvim_check.stdout | default('')) }}"

- name: "[nvim] Download Neovim pre-built binary ({{ nvim_version }})"
  become: true
  ansible.builtin.get_url:
    url: "https://github.com/neovim/neovim/releases/download/{{ nvim_version }}/nvim-linux-x86_64.tar.gz"
    dest: "/tmp/nvim-linux64.tar.gz"
    mode: "0644"
  when: nvim_needs_install

- name: "[nvim] Remove previous Neovim install directories if present"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/opt/nvim-linux-x86_64"  # current layout
    - "/opt/nvim-linux64"       # legacy layout
  when: nvim_needs_install

- name: "[nvim] Extract Neovim pre-built binary"
  become: true
  ansible.builtin.unarchive:
    src: "/tmp/nvim-linux64.tar.gz"
    dest: "/opt"
    remote_src: yes
  when: nvim_needs_install

- name: "[nvim] Ensure /usr/local/bin directory exists"
  become: true
  ansible.builtin.file:
    path: "/usr/local/bin"
    state: directory
    mode: "0755"
  when: nvim_needs_install

- name: "[nvim] Create symlink for nvim binary"
  become: true
  ansible.builtin.file:
    src: "/opt/nvim-linux-x86_64/bin/nvim"
    dest: "/usr/local/bin/nvim"
    state: link
    follow: false
    force: yes
  when: nvim_needs_install

- name: "[nvim] Ensure /usr/local/bin is in system PATH"
  become: true
  ansible.builtin.lineinfile:
    path: /etc/profile.d/usr-local-bin.sh
    line: 'export PATH="/usr/local/bin:$PATH"'
    create: yes
    mode: "0644"
  when: nvim_needs_install

- name: "[nvim] Cleanup downloaded tarball"
  become: true
  ansible.builtin.file:
    path: "/tmp/nvim-linux64.tar.gz"
    state: absent
  when: nvim_needs_install

- name: "[nvim] Verify Neovim installation"
  ansible.builtin.command: /usr/local/bin/nvim --version
  register: nvim_version
  changed_when: false

- name: "[nvim] Display Neovim version"
  ansible.builtin.debug:
    msg: "{{ nvim_version.stdout_lines[0] }}"
